########################################
# Server
########################################
quarkus.http.port=9005

########################################
# CORS
########################################
# Handled by API Gateway (NGINX)
# quarkus.http.cors.enabled=true
# quarkus.http.cors.origins=http://localhost:4200,http://localhost:4300
# quarkus.http.cors.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
# quarkus.http.cors.headers=Content-Type,Authorization
# quarkus.http.cors.exposed-headers=Authorization
# quarkus.http.cors.access-control-allow-credentials=true
########################################
# Datasource (PostgreSQL)
########################################
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=janocare
quarkus.datasource.password=janocare123

# Local Development
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5433/janocare_auth

# Docker / Production
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://auth-postgres:5432/janocare_auth

########################################
# Hibernate ORM
########################################
quarkus.hibernate-orm.log.sql=true

########################################
# Flyway
########################################
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.locations=db/migration

########################################
# JWT (SmallRye)
########################################
smallrye.jwt.sign.key.location=classpath:privateKey.pem
smallrye.jwt.verify.key.location=classpath:publicKey.pem
smallrye.jwt.algorithm=RS256
smallrye.jwt.new-token.lifespan=1800
smallrye.jwt.new-token.issuer=janocare-auth
smallrye.jwt.always-check-authorization=true

########################################
# Redis
########################################

# Local Development
%dev.quarkus.redis.hosts=redis://localhost:16380

# Docker / Production
%prod.quarkus.redis.hosts=redis://redis:6379

########################################
# Logging
########################################
quarkus.log.level=INFO
quarkus.log.category."com.janocare".level=INFO
quarkus.log.category."io.quarkus.arc".level=WARN
quarkus.log.category."io.quarkus.arc.processor".level=WARN

########################################
# Swagger / OpenAPI
########################################
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger
quarkus.smallrye-openapi.path=/openapi
quarkus.smallrye-openapi.security-scheme=jwt
quarkus.smallrye-openapi.security-scheme-name=bearerAuth

########################################
# REST CLIENTS
########################################

# Professional Service

# Local Development
%dev.professional-service/mp-rest/url=http://localhost:8080/api

# Docker / Production
%prod.professional-service/mp-rest/url=http://professional-service:8080/api

professional-service/mp-rest/scope=jakarta.inject.Singleton

# Notification Service

# Local Development
%dev.notification-service/mp-rest/url=http://localhost:9030/api

# Docker / Production
%prod.notification-service/mp-rest/url=http://notification-service:8080/api

notification-service/mp-rest/scope=jakarta.inject.Singleton

########################################
# Health + Metrics
########################################
quarkus.smallrye-health.root-path=/q/health
quarkus.micrometer.export.prometheus.path=/q/metrics

########################################
# OpenTelemetry Tracing
########################################
quarkus.otel.enabled=true
quarkus.otel.traces.enabled=true
quarkus.otel.metrics.enabled=false
quarkus.otel.logs.enabled=false

########################################
# Jaeger / OTEL Exporter
########################################
quarkus.otel.exporter.otlp.endpoint=http://jaeger:4317
quarkus.otel.exporter.otlp.protocol=grpc