########################################
# Server
########################################
quarkus.http.port=9010
quarkus.rest.path=/api
########################################
# Datasource (PostgreSQL)
########################################
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=janocare
quarkus.datasource.password=janocare123

# Local Development
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5434/janocare_booking

# Docker / Production
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://booking-postgres:5432/janocare_booking

########################################
# Hibernate ORM
########################################
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.database.generation=update

########################################
# JWT
########################################
mp.jwt.verify.publickey.location=classpath:publicKey.pem
mp.jwt.verify.issuer=janocare-auth

########################################
# Swagger / OpenAPI
########################################
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger
quarkus.smallrye-openapi.path=/openapi

########################################
# CORS
########################################
# Handled by API Gateway (NGINX)

########################################
# Logging
########################################
quarkus.log.level=INFO
quarkus.log.category."com.janocare".level=INFO
quarkus.log.category."io.quarkus.arc".level=WARN
quarkus.log.category."io.quarkus.arc.processor".level=WARN

########################################
# REST CLIENTS
########################################

# Payment Service

# Local Development
%dev.payment-service/mp-rest/url=http://localhost:9020/api

# Docker / Production
%prod.payment-service/mp-rest/url=http://payment-service:8080/api

payment-service/mp-rest/scope=jakarta.inject.Singleton

# Notification Service

# Local Development
%dev.notification-service/mp-rest/url=http://localhost:9030/api

# Docker / Production
%prod.notification-service/mp-rest/url=http://notification-service:8080/api

notification-service/mp-rest/scope=jakarta.inject.Singleton

########################################
# Health + Metrics
########################################
# quarkus.smallrye-health.root-path=/q/health
# quarkus.micrometer.export.prometheus.path=/q/metrics

########################################
# OpenTelemetry Tracing
########################################
# quarkus.otel.enabled=true
# quarkus.otel.traces.enabled=true
# quarkus.otel.metrics.enabled=false
# quarkus.otel.logs.enabled=false
########################################
# CORS
########################################
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:4200,http://localhost:4300
quarkus.http.cors.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.exposed-headers=Authorization
quarkus.http.cors.access-control-allow-credentials=true
########################################
# Jaeger / OTEL Exporter
########################################
quarkus.otel.exporter.otlp.endpoint=http://jaeger:4317
quarkus.otel.exporter.otlp.traces.protocol=grpc

# Professional Service

# Local Development
%dev.quarkus.rest-client.professional-service.url=http://localhost:8080/api

# Docker / Production
%prod.quarkus.rest-client.professional-service.url=http://professional-service:8080/api

quarkus.rest-client.professional-service.scope=jakarta.inject.Singleton