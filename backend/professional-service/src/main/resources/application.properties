########################################
# Server
########################################
quarkus.http.port=8080
quarkus.rest.path=/api

########################################
# Datasource (PostgreSQL)
########################################
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=janocare
quarkus.datasource.password=janocare123

# Local Development
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/janocare_professional

# Docker / Production
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://professional-postgres:5432/janocare_professional

########################################
# Hibernate ORM
########################################
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.schema-management.strategy=update

########################################
# JWT
########################################
mp.jwt.verify.publickey.location=classpath:publicKey.pem
mp.jwt.verify.issuer=janocare-auth

########################################
# OpenAPI / Swagger
########################################
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.path=/swagger
quarkus.swagger-ui.always-include=true

########################################
# CORS
########################################
# quarkus.http.cors.enabled=true
# quarkus.http.cors.origins=http://localhost:4200,http://localhost:4300
# quarkus.http.cors.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
# quarkus.http.cors.headers=Content-Type,Authorization
# quarkus.http.cors.exposed-headers=Authorization
# quarkus.http.cors.access-control-allow-credentials=true

########################################
# Logging
########################################
quarkus.log.level=INFO
quarkus.log.category."com.janocare".level=INFO
quarkus.log.category."io.quarkus.arc".level=WARN
quarkus.log.category."io.quarkus.arc.processor".level=WARN

########################################
# Health + Metrics
########################################
quarkus.smallrye-health.root-path=/q/health
quarkus.micrometer.export.prometheus.path=/q/metrics


########################################
# OpenTelemetry Tracing
########################################
quarkus.otel.enabled=false
quarkus.otel.traces.enabled=false
quarkus.otel.metrics.enabled=false
quarkus.otel.logs.enabled=false


quarkus.log.category."io.smallrye.jwt".level=DEBUG
quarkus.log.category."io.quarkus.smallrye.jwt".level=DEBUG
quarkus.log.category."io.quarkus.security".level=DEBUG


# Local Development
%dev.quarkus.rest-client.auth-service.url=http://localhost:9005

# Docker / Production
%prod.quarkus.rest-client.auth-service.url=http://auth-service:8080