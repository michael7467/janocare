events {}

http {

    server {

        listen 8080;

        #############################################
        # GLOBAL CORS
        #############################################

        add_header Access-Control-Allow-Origin "http://localhost:4200" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;

        #############################################
        # AUTH SERVICE
        #############################################

        location /api/auth/ {

            if ($request_method = OPTIONS) {
                return 204;
            }

            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;

            proxy_pass http://auth-service:8080/auth/;
        }
        
        location /api/otp/ {

            if ($request_method = OPTIONS) {
                return 204;
            }

            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;

            proxy_pass http://auth-service:8080/otp/;
        }
        location /api/password/ {
            if ($request_method = OPTIONS) {
                return 204;
            }
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;
            proxy_pass http://auth-service:8080/password/;
        }
        location /api/profile/ {

            if ($request_method = OPTIONS) {
                return 204;
            }

            proxy_pass http://auth-service:8080/profile/;
        }

        location /api/countries {
            if ($request_method = OPTIONS) {
                return 204;
            }
            proxy_pass http://auth-service:8080/countries;
        }

        location /api/states {
            if ($request_method = OPTIONS) {
                return 204;
            }
            proxy_pass http://auth-service:8080/states;
        }

        location /api/cities {
            if ($request_method = OPTIONS) {
                return 204;
            }
            proxy_pass http://auth-service:8080/cities;
        }
        location /api/uploads/ {
            proxy_pass http://auth-service:8080/uploads/;
        }
        location /uploads/ {
            proxy_pass http://auth-service:8080/uploads/;
        }
        location /api/users {
            if ($request_method = OPTIONS) {
                return 204;
            }
            proxy_pass http://auth-service:8080/users;
        }
            #############################################
        # PROFESSIONAL SERVICE
        #############################################

        location /api/professionals {
            if ($request_method = OPTIONS) {
                return 204;
            }
            proxy_pass http://professional-service:8080/api/professionals;
        }

        location /api/profession-types {
            if ($request_method = OPTIONS) {
                return 204;
            }
            proxy_pass http://professional-service:8080/api/profession-types;
        }

        location /api/professional-achievements {
            if ($request_method = OPTIONS) {
                return 204;
            }
            proxy_pass http://professional-service:8080/api/professional-achievements;
        }

        location /api/professional-experiences {
            if ($request_method = OPTIONS) {
                return 204;
            }
            proxy_pass http://professional-service:8080/api/professional-experiences;
        }

        location /api/professional-infos {
            if ($request_method = OPTIONS) {
                return 204;
            }
            proxy_pass http://professional-service:8080/api/professional-infos;
        }

        location /api/professional-memberships {
            if ($request_method = OPTIONS) {
                return 204;
            }
            proxy_pass http://professional-service:8080/api/professional-memberships;
        }

        location /api/professional-qualifications {
            if ($request_method = OPTIONS) {
                return 204;
            }
            proxy_pass http://professional-service:8080/api/professional-qualifications;
        }

        location /api/professional-registrations {
            if ($request_method = OPTIONS) {
                return 204;
            }
            proxy_pass http://professional-service:8080/api/professional-registrations;
        }

        location /api/professional-reviews {
            if ($request_method = OPTIONS) {
                return 204;
            }
            proxy_pass http://professional-service:8080/api/professional-reviews;
        }

        location /api/professional-services {
            if ($request_method = OPTIONS) {
                return 204;
            }
            proxy_pass http://professional-service:8080/api/professional-services;
        }

        location /api/professional-specializations {
            if ($request_method = OPTIONS) {
                return 204;
            }
            proxy_pass http://professional-service:8080/api/professional-specializations;
        }

        location /api/professional-sub-specializations {
            if ($request_method = OPTIONS) {
                return 204;
            }
            proxy_pass http://professional-service:8080/api/professional-sub-specializations;
        }

        location /api/specializations {
            if ($request_method = OPTIONS) {
                return 204;
            }
            proxy_pass http://professional-service:8080/api/specializations;
        }

        location /api/sub-specializations {
            if ($request_method = OPTIONS) {
                return 204;
            }
            proxy_pass http://professional-service:8080/api/sub-specializations;
        }

        #############################################
        # BOOKING SERVICE
        #############################################

       location /api/booking-slots {
            if ($request_method = OPTIONS) {
                return 204;
            }
            proxy_pass http://booking-service:8080/api/professionals/booking-slots;
        }
        location /api/public/booking-slots {
            if ($request_method = OPTIONS) {
                return 204;
            }
            proxy_pass http://booking-service:8080/api/professionals/public/booking-slots;
        }
      location /api/appointments {
            if ($request_method = OPTIONS) {
                return 204;
            }
            proxy_pass http://booking-service:8080/api/appointments;
        }

        location /api/cancellation-reasons {
            if ($request_method = OPTIONS) {
                return 204;
            }
            proxy_pass http://booking-service:8080/api/cancellation-reasons;
        }

        #############################################
        # PAYMENT SERVICE
        #############################################

        location /api/payments {
            proxy_pass http://payment-service:8080/api/payments;
        }

        #############################################
        # NOTIFICATION SERVICE
        #############################################

        location /api/notifications {
            proxy_pass http://notification-service:8080/api/notifications;
        }
    }
}