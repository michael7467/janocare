<div class="auth-page-wrapper pt-5">
    <!-- auth page bg -->
    <div class="auth-one-bg-position auth-one-bg" id="auth-particles">
      <div class="bg-overlay"></div>
  
      <div class="shape">
        <svg xmlns="http://www.w3.org/2000/svg" version="1.1" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1440 120">
          <path d="M 0,36 C 144,53.6 432,123.2 720,124 C 1008,124.8 1296,56.8 1440,40L1440 140L0 140z"></path>
        </svg>
      </div>
    </div>
  
    <!-- auth page content -->
    <div class="auth-page-content">
      <div class="container">
        <div class="row">
          <div class="col-lg-12">
            <div class="text-center mt-sm-5 mb-4 text-white-50">
              <div>
                <a routerLink="" class="d-inline-block auth-logo">
                  <img src="assets/images/result.png" alt="" height="20" />
                </a>
              </div>
              <p class="mt-3 fs-15 fw-medium">WeCare.et</p>
            </div>
          </div>
        </div>
        <!-- end row -->
  
        <div class="row justify-content-center">
          <div class="col-md-8 col-lg-6 col-xl-5">
            <div class="card mt-4">
              <div class="card-body p-4">
                <div class="text-center mt-2">
                  <h5 class="text-primary">Set new password</h5>
                  <!-- <p class="text-muted">Please provide your previous credential with Transfer.et</p> -->
                  <!-- <lord-icon src="https://cdn.lordicon.com/rhvddzym.json" trigger="loop" colors="primary:#0ab39c" class="avatar-xl"> </lord-icon> -->
                </div>
  
                <!-- <div class="alert alert-borderless alert-warning text-center mb-2 mx-2" role="alert">Enter your email and instructions will be sent to you!</div> -->
                <div class="p-2">
                  <form name="resetForm" [formGroup]="resetForm" (ngSubmit)="onSubmit()" novalidate>
                    <ngb-alert type="danger" *ngIf="error" [dismissible]="false">{{ error }}</ngb-alert>
  
                    <div class="mb-3">
                      <label for="previousPassword">Previous Password</label>
                      <div class="input-group auth-pass-inputgroup">
                        <input
                          [type]="showPrevPassword ? 'text' : 'password'"
                          formControlName="previousPassword"
                          class="form-control"
                          [ngClass]="{ 'is-invalid': submitted && f['previousPassword'].errors }"
                          id="previousPassword"
                          placeholder="Previous Password"
                        />
  
                        <button class="btn btn-light ms-0" type="button" id="password-addon" (click)="showPrevPassword = !showPrevPassword">
                          <i [ngClass]="{ 'mdi mdi-eye-off-outline': showPrevPassword, 'mdi mdi-eye-outline': !showPrevPassword }"></i>
                        </button>
  
                        <div *ngIf="submitted && f['previousPassword'].errors" class="invalid-feedback">
                          <div *ngIf="f['previousPassword'].errors['required']">Previous Password is required</div>
                        </div>
                      </div>
                    </div>
  
                    <div class="mb-3">
                      <label for="newPassword">New Password</label>
                      <div class="input-group auth-pass-inputgroup">
                        <input
                          [type]="showNewPassword ? 'text' : 'password'"
                          formControlName="newPassword"
                          class="form-control"
                          [ngClass]="{ 'is-invalid': submitted && f['newPassword'].errors }"
                          id="newPassword"
                          placeholder="New Password"
                        />
  
                        <button class="btn btn-light ms-0" type="button" id="password-addon" (click)="togglePassword()">
                          <i [ngClass]="{ 'mdi mdi-eye-off-outline': !!showNewPassword, 'mdi mdi-eye-outline': !showNewPassword }" ></i>
                        </button>
  
                        <div *ngIf="submitted && f['newPassword'].errors" class="invalid-feedback">
                          <div *ngIf="f['newPassword'].errors['required']">New Password is required</div>
                        </div>
                      </div>
                    </div>
  
                    <div class="mb-3">
                      <label for="confirmPassword">Confirm Password</label>
                      <div class="input-group auth-pass-inputgroup">
                        <input
                          [type]="showConfirmPassword ? 'text' : 'password'"
                          formControlName="confirmPassword"
                          class="form-control"
                          [ngClass]="{ 'is-invalid': submitted && f['confirmPassword'].errors }"
                          id="confirmPassword"
                          placeholder="Confirm Password"
                        />
  
                        <button class="btn btn-light ms-0" type="button" id="password-addon" >
                          <i [ngClass]="{ 'mdi mdi-eye-off-outline': showConfirmPassword, 'mdi mdi-eye-outline': !showConfirmPassword }" (click)="toggleConfirmPassword()"></i>
                        </button>
  
                        <div *ngIf="submitted && f['confirmPassword'].errors" class="invalid-feedback">
                          <div *ngIf="f['confirmPassword'].errors['required']">Confirm Password is required</div>
                        </div>
                      </div>
                    </div>
  
                    <div class="text-center mt-4">
                      <button class="btn btn-success w-100" type="submit">Continue</button>
                    </div>
                  </form>
                  <!-- end form -->
                </div>
              </div>
              <!-- end card body -->
            </div>
            <!-- end card -->
  
            <!-- <div class="mt-4 text-center">
              <p class="mb-0">Wait, I remember my password... <a routerLink="/auth/signin/basic" class="fw-semibold text-primary text-decoration-underline"> Click here </a></p>
            </div> -->
          </div>
        </div>
        <!-- end row -->
      </div>
      <!-- end container -->
    </div>
    <!-- end auth page content -->
  
    <!-- footer -->
    <footer class="footer">
      <div class="container">
        <div class="row">
          <div class="col-lg-12">
            <div class="text-center">
              <p class="mb-0 text-muted">
                &copy;
                <script>
                  document.write(new Date().getFullYear());
                </script>
                WeCare.et. from Teleport Technologies PLC
              </p>
            </div>
          </div>
        </div>
      </div>
    </footer>
    <!-- end Footer -->
  </div>
  <!-- end auth-page-wrapper -->
