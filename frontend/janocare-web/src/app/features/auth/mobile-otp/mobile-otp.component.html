<div class="login-content-info otp-top">
    <div class="container">

        <!-- Login Phone Otp -->
        <div class="row justify-content-center">
            <div class="col-lg-4 col-md-6">
                <div class="account-content">
                    <div class="login-shapes">
                        <div class="shape-img-left">
                            <img src="assets/img/shape-01.png" alt="shape-image">
                        </div>
                        <div class="shape-img-right">
                            <img src="assets/img/shape-02.png" alt="shape-image">
                        </div>
                    </div>
                    <div class="account-info">
                        <div class="login-back">
                            <a [routerLink] = "routes.professionalRegister"><i class="fa-solid fa-arrow-left-long"></i> Back</a>
                        </div>
                  
                        <div class="login-title">
                            <h3>Phone OTP Verification</h3>
                            <p class="mb-0">OTP sent to your mobile number ending <strong>******{{lastFourDigits}}</strong></p>
                        </div>
                        <form method="get" class="digit-group login-form-control" data-group-name="digits" data-autosubmit="false" autocomplete="off" [formGroup]="otpForm" (ngSubmit)="onSubmit()" tabindex="1">
                            <div class="otp-box">
                                <div class="row">
                                    <input formControlName="data1" 
                            
                                    [class.is-valid]="isAllvalid" 
                                    [class.is-invalid]="(otpForm.controls['data1'].invalid && otpForm.controls['data1'].touched) || ( otpForm.controls['data1'].valid && !isAllvalid && isAllChcked)" 
                                    [(ngModel)]="oneTimePassword.data1" maxlength="1" 
                                    (keydown.backspace)="tiggerBackspace(oneTimePassword.data1 , 'digit-1')" 
                                    (input)="ValueChanged(oneTimePassword.data1 , 'digit-1')" 
                                    type="text" id="digit-1" name="digit-1" data-next="digit-2" maxlength="1">
       

                                    <input formControlName="data2"
                                    [class.is-valid]="isAllvalid" 
                                    [class.is-invalid]="otpForm.controls['data2'].invalid && otpForm.controls['data2'].touched|| ( otpForm.controls['data2'].valid && !isAllvalid && isAllChcked)" 
                                    [(ngModel)]="oneTimePassword.data2" maxlength="1" 
                                    (keydown.backspace)="tiggerBackspace(oneTimePassword.data2 , 'digit-2')" 
                                    (input)="ValueChanged(oneTimePassword.data2 , 'digit-2')"
                                    type="text" id="digit-2" name="digit-2" data-next="digit-3" data-previous="digit-1" maxlength="1" >
                            
                                    
                                    <input formControlName="data3" 
                                    [class.is-valid]="isAllvalid" 
                                    [class.is-invalid]="otpForm.controls['data3'].invalid && otpForm.controls['data3'].touched || ( otpForm.controls['data3'].valid && !isAllvalid && isAllChcked)"
                                    [(ngModel)]="oneTimePassword.data3" maxlength="1" 
                                    (keydown.backspace)="tiggerBackspace(oneTimePassword.data3 , 'digit-3')" 
                                    (input)="ValueChanged(oneTimePassword.data3 , 'digit-3')" 
                                    type="text" id="digit-3" name="digit-3" data-next="digit-4" data-previous="digit-2" maxlength="1">

                                    <input formControlName="data4" 
                                    [class.is-valid]="isAllvalid" 
                                    [class.is-invalid]="otpForm.controls['data4'].invalid && otpForm.controls['data4'].touched || ( otpForm.controls['data4'].valid && !isAllvalid && isAllChcked)"
                                    [(ngModel)]="oneTimePassword.data4" maxlength="1" 
                                    (keydown.backspace)="tiggerBackspace(oneTimePassword.data4 , 'digit-4')" 
                                    (input)="ValueChanged(oneTimePassword.data4 , 'digit-4')" 
                                    type="text" id="digit-4" name="digit-4" data-next="digit-5" data-previous="digit-3" maxlength="1">

                                    <input formControlName="data5"
                                    [class.is-valid]="isAllvalid" 
                                    [class.is-invalid]="otpForm.controls['data5'].invalid && otpForm.controls['data5'].touched || ( otpForm.controls['data5'].valid && !isAllvalid && isAllChcked)"
                                    [(ngModel)]="oneTimePassword.data5" maxlength="1" 
                                    (keydown.backspace)="tiggerBackspace(oneTimePassword.data5 , 'digit-5')"  
                                    (input)="ValueChanged(oneTimePassword.data4 , 'digit-5')" 
                                    type="text" id="digit-5" name="digit-5" data-next="digit-6" data-previous="digit-4" maxlength="1">

                                    <input formControlName="data6" 
                                    [class.is-valid]="isAllvalid" 
                                    [class.is-invalid]="otpForm.controls['data6'].invalid && otpForm.controls['data6'].touched || ( otpForm.controls['data6'].valid && !isAllvalid && isAllChcked)"
                                    [(ngModel)]="oneTimePassword.data6" maxlength="1"
                                    (keydown.backspace)="tiggerBackspace(oneTimePassword.data6 , 'digit-6')"  
                                    (input)="ValueChanged(oneTimePassword.data4 , 'digit-6')"
                                    type="text" id="digit-6" name="digit-6" data-next="digit-6" data-previous="digit-5" maxlength="1">

                                </div>
                            </div>
                            <div class="forms-block">
                                <div class="otp-info">
                                    <div class="otp-code">
                                        <p>Didn't receive OTP code?</p>
                                        <a (click)="resendOtp()">Resend Code</a>
                                    </div>
                                    <div class="otp-sec">
                                        <p><i class="feather icon-clock"></i> 00:{{countDown}} secs</p>
                                    </div>
                                </div>
                            </div>
                            <div class="reset-btn">
                                <button [disabled]="otpForm.invalid ||(otpForm.valid &&!isAllvalid && isAllChcked) " class="btn w-100" type="submit">Submit</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <!-- /Login Phone Otp -->

    </div>
</div>
