  <!-- Add Time Slot Modal -->
  <form>
    <div class="hours-info">
        <div class="row hours-cont" *ngFor="let data of hours; let i = index">
            <div class="col-12 col-md-10">
                <div class="row">
                    <div class="col-12 col-md-6">
                        <div class="mb-3">
                            <label for="start-time">Start Time</label>
                            <select class="form-select form-control">
                                <option>-</option>
                                <option>12.00 am</option>
                                <option>12.30 am</option>
                                <option>1.00 am</option>
                                <option>1.30 am</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-12 col-md-6">
                        <div class="mb-3">
                            <label for="end-time">End Time</label>
                            <select class="form-select form-control">
                                <option>-</option>
                                <option>12.00 am</option>
                                <option>12.30 am</option>
                                <option>1.00 am</option>
                                <option>1.30 am</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-2" *ngIf="i">
                <label for="" class="d-md-block d-sm-none d-none">&nbsp;</label><a href="javascript:void(0)"
                    class="btn btn-danger trash" (click)="dltHours(i)"><i
                        class="far fa-trash-alt"></i></a>
            </div>
        </div>
    </div>

    <div class="add-more mb-3">
        <a href="javascript:void(0);" (click)="addHours()" class="add-hours"><i
                class="fa fa-plus-circle"></i> Add More</a>
    </div>
    <div class="submit-section text-center">
        <button type="submit" class="btn btn-primary submit-btn">Save</button>
    </div>
</form>

<!-- /Add Time Slot Modal -->
