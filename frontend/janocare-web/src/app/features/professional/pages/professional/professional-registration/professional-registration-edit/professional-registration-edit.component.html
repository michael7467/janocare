  
  <form *ngIf="isLoaded && !isError" (ngSubmit)="goToNext(frm)" [formGroup]="frm" novalidate>
    <div class="row">
      <div class="col-md-12">
        <app-tp-input [label]="'Name'" [type]="'text'" formControlName="registrationName" [control]="registrationName"> </app-tp-input>
      </div>
      <div class="col-12">
        <div class="mb-3 " class="date-input">

          <label *ngIf="!registrationDate.touched" [for]="id" class="d-block"> Completion Date {{ isRequired }} </label>
          <label *ngIf="registrationDate.touched && !registrationDate.invalid" [for]="id" class="valid-feedback d-block">Completion Date {{ isRequired }}</label>
          <label *ngIf="registrationDate.touched && registrationDate.invalid" [for]="id" class="invalid-feedback d-block">Completion Date {{ isRequired }}</label>
          <div class="cal-icon">
            <input placeholder="Select Date" class="form-control flatpickr-input"  formControlName="registrationDate" 
            [minDate]="minDate"  type="text" mwlFlatpickr [altInput]="true" [convertModelValue]="true">
            <!-- <input formControlName="registrationDate" placeholder="Select Date" type="text"  class="form-control mb-3" #dp="bsDatepicker" bsDatepicker  container=".date-input" /> -->
          </div>
        </div>
      </div>
      <div class="col-lg-12 mt-4">
        <label *ngIf="!isTouched && !isImageSelected" [for]="id" class="d-block"> Images {{ isRequiredImage }} </label>
        <label *ngIf="isTouched && isImageSelected" [for]="id" class="valid-feedback d-block">Images {{ isRequiredImage }}</label>
        <label *ngIf="isTouched && !isImageSelected" [for]="id" class="invalid-feedback d-block">Images {{ isRequiredImage }}</label>
        <ngx-dropzone [acceptedFiles]="'pdf/*'" class="dropzone_sec" (change)="onSelect($event)" (click)="onTouched()">
          <ngx-dropzone-label   class="dropzone-text">Click or drag files to upload</ngx-dropzone-label>
        </ngx-dropzone>
        <div [id]="'validation' + id" class="invalid-feedback d-block">
          &nbsp;
          <ng-container *ngIf="isTouched && !isImageSelected">
            <small class="text-danger" *ngFor="let error of ErrorsImage"> <i class="ri ri-close-line"> </i> {{ error.message }} </small>
          </ng-container>
        </div>
        <div class="images-display" style="display: flex; flex-wrap: wrap;">
          <div *ngFor="let f of files; let i = index" style="position: relative; display: inline-flex; align-items: center; margin-right: 10px;">
            <div>
              <img class="image-preview inline-image" [src]="f.preview" alt="Image preview" />
              <p>{{ f.name }}</p>
            </div>
       
            <button type="button" class="btn btn-light btn-sm" (click)="removeFile(i)" style="position: absolute; top: 0; right: 0;">
              <i class="las la-times"></i>
            </button>
          </div>
          <span class="file-upload-label">{{ fileName }}</span>

        </div>
        <!-- <div *ngFor="let f of files" class="images-display" style="display: flex;">
          <div style="display: inline-flexbox;">
            <img class="image-preview inline-image" [src]="f.preview" alt="Image preview" />
            <p>{{ f.name }}</p>
          </div>
       
        </div> -->
 
  </div> 
      <!-- <div class="col-12">
        <div class="file-upload">
          <button type="button" class="file-upload-button" (click)="fileInput.click()">
            <i class="fas fa-cloud-upload-alt fa-3x"></i>
            <br>
            Select File
          </button>
          <input type="file" #fileInput class="file-upload-input" (change)="onFileSelected($event)" />
          <span class="file-upload-label">{{ fileName }}</span>
        </div>
      </div> -->
    </div>
  
    <div class="form-group row mt-4">
      <div class="col-12 text-center">
        <button type="submit" class="btn btn-primary" [disabled]="frm.invalid">
          <i class="ri ri-save-line label-icon align-middle fs-16 me-2"></i>
          {{ saveLabel }} Details
        </button>
      </div>
    </div>
  </form>
