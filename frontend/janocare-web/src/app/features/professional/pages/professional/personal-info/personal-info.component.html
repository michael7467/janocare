<div class="position-relative mx-n4 mt-n4">
  <div class="profile-wid-bg profile-setting-img">
      <img src="assets/images/profile-bg.jpg" class="profile-wid-img" alt="">
      <div class="overlay-content">
          <div class="text-end p-3">
        
          </div>
      </div>
  </div>
</div>

<div class="row">
  <div class="col-xxl-3">
      <div class="card mt-n5">
          <div class="card-body p-4">
              <div class="text-center">
                  <div class="profile-user position-relative d-inline-block mx-auto  mb-4">
                      <!-- <img [src]="(authService?.userProfileProfile$ | async)?.profilePic | removePort"  appImgFallback="assets/images/users/user-dummy-img.jpg" class="rounded-circle avatar-xl img-thumbnail user-profile-image" alt="user-profile-image"> -->
                      <img
  [src]="getProfileImageUrl((authService.userProfileProfile$ | async)?.profilePic)"
  appImgFallback="assets/images/users/user-dummy-img.jpg"
  class="rounded-circle avatar-xl img-thumbnail user-profile-image"
  alt="user-profile-image">
                      
                      <div class="avatar-xs p-0 rounded-circle profile-photo-edit">
                          <input id="profile-img-file-input" type="file" (change)="onFileSelected($event)" class="profile-img-file-input">
                          <!-- <input type="file" id="fileInput"  hidden/> -->
                          <label for="profile-img-file-input" class="profile-photo-edit avatar-xs">
                              <span class="avatar-title rounded-circle bg-light text-body">
                                  <i class="ri-camera-fill"></i>
                              </span>
                          </label>
                      </div>
                  </div>
                  <h5 class="fs-16 mb-1">
                      </h5>
                  <p class="text-muted mb-0"></p>
              </div>
          </div>
      </div><!--end card-->

  </div><!--end col-->
  <div class="col-xxl-9">
      <div class="card mt-xxl-n5">
          <div class="card-header">
              <ul ngbNav #customNav="ngbNav" [activeId]="1" class="nav nav-tabs-custom rounded card-header-tabs border-bottom-0" role="tablist">
                  <li [ngbNavItem]="1" class="nav-item">
                      <a ngbNavLink class="nav-link" data-bs-toggle="tab" role="tab">
                          <i class="fas fa-home"></i>
                          Personal Details
                      </a>
                      <ng-template ngbNavContent>
                        <app-personal-info-setting></app-personal-info-setting>
          
                      </ng-template>
                  </li>
                  <li [ngbNavItem]="2" class="nav-item">
                      <a ngbNavLink class="nav-link" data-bs-toggle="tab" role="tab">
                          <i class="far fa-user"></i>
                          Change Password
                      </a>
                      <ng-template ngbNavContent>
                          <form [formGroup]="setPassForm" (ngSubmit)="onSubmitPassword()" novalidate>
                              <div class="row g-2">
                                  <div class="col-lg-4">
                                      <div>
                                        <label class="form-label" for="password-input">Old Password</label>
                                        <div class="position-relative auth-pass-inputgroup mb-3">
                                          <input
                                            [type]="fieldTextTypeOld ? 'text' : 'password'"
                                            class="form-control pe-5"
                                            placeholder="Enter old password"
                                            id="password-input"
                                            formControlName="previousPassword"
                                            [ngClass]="{ 'is-invalid': submitted && setPassForm['previousPassword'].errors }"
                                          />
                                          <button class="btn btn-link position-absolute end-0 top-0 text-decoration-none text-muted" type="button" id="password-addon">
                                            <i class="mdi align-middle" [ngClass]="{ 'mdi-eye-off-outline': !fieldTextTypeOld, 'mdi-eye-outline': fieldTextTypeOld }" (click)="toggleFieldTextTypeOld()"></i>
                                          </button>
                                          <div *ngIf="submitted && setPassForm['previousPassword'].errors" class="invalid-feedback">
                                            <span *ngIf="setPassForm['previousPassword'].errors['required']">Old Password is required</span>
                                          </div>
                                        </div>
                           
                                      </div>
                                  </div><!--end col-->
                                  <div class="col-lg-4">
                                      <div>
                                        <label class="form-label" for="password-input">New Password</label>
                                        <div class="position-relative auth-pass-inputgroup mb-3">
                                          <input
                                            [type]="fieldTextType ? 'text' : 'password'"
                                            class="form-control pe-5"
                                            placeholder="Enter new password"
                                            id="password-input"
                                            formControlName="password"
                                            [ngClass]="{ 'is-invalid': submitted && setPassForm['password'].errors }"
                                          />
                                          <button class="btn btn-link position-absolute end-0 top-0 text-decoration-none text-muted" type="button" id="password-addon">
                                            <i class="mdi align-middle" [ngClass]="{ 'mdi-eye-off-outline': !fieldTextType, 'mdi-eye-outline': fieldTextType }" (click)="toggleFieldTextType()"></i>
                                          </button>
                                          <div *ngIf="submitted && setPassForm['password'].errors" class="invalid-feedback">
                                            <span *ngIf="setPassForm['password'].errors['required']">Old Password is required</span>
                                          </div>
                                        </div>
                         
                                      </div>
                                  </div><!--end col-->
                                  <div class="col-lg-4">
                                      <div>
                                        <label class="form-label" for="password-input">Confirm Password</label>
                                        <div class="position-relative auth-pass-inputgroup mb-3">
                                          <input
                                            [type]="fieldTextTypeNew ? 'text' : 'password'"
                                            class="form-control pe-5"
                                            placeholder="Enter new password"
                                            id="password-input"
                                            formControlName="confirmPassword"
                                            [ngClass]="{ 'is-invalid': submitted && setPassForm['confirmPassword'].errors }"
                                          />
                                          <button class="btn btn-link position-absolute end-0 top-0 text-decoration-none text-muted" type="button" id="password-addon">
                                            <i class="mdi align-middle" [ngClass]="{ 'mdi-eye-off-outline': !fieldTextTypeNew, 'mdi-eye-outline': fieldTextTypeNew }" (click)="toggleFieldTextTypeNew()"></i>
                                          </button>
                                          <div *ngIf="submitted && setPassForm['pasconfirmPasswordsword'].errors" class="invalid-feedback">
                                            <span *ngIf="setPassForm['confirmPassword'].errors['required']">Old Password is required</span>
                                          </div>
                                        </div>
                                          <!-- <app-tp-input [label]="'Confirm Password'" [type]="'password'" formControlName="confirmPassword" [control]="confirmPassword"> </app-tp-input> -->

                                      </div>
                                  </div><!--end col-->
                        
                                  <div class="col-lg-12">
                                      <div class="text-end">
                                          <button type="submit" class="btn btn-success" [disabled]="setPassForm.invalid">Change Password</button>
                                      </div>
                                  </div><!--end col-->
                              </div><!--end row-->
                          </form>
              
                      </ng-template>
                  </li>
               
              </ul>
          </div>
          <div class="card-body p-4">
              <div class="tab-content">
                  <div [ngbNavOutlet]="customNav"></div>
              </div>
          </div>
      </div>
  </div><!--end col-->
</div><!--end row-->
