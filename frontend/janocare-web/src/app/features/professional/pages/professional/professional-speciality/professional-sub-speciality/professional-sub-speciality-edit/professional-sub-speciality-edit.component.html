<form *ngIf="isLoaded && !isError" (ngSubmit)="goToNext(frm)" [formGroup]="frm" novalidate>
  <div class="row">
    <div class="col-md-12">
      <div class="mb-3">
        <label *ngIf="!subSpecializationId.touched" [for]="id" class="d-block">Sub Specialization {{ isRequiredBank }} </label>
        <label *ngIf="subSpecializationId.touched && !subSpecializationId.invalid" [for]="id" class="valid-feedback d-block">Specialization {{ isRequiredBank }}</label>
        <label *ngIf="subSpecializationId.touched && subSpecializationId.invalid" [for]="id" class="invalid-feedback d-block">Specialization {{ isRequiredBank }}</label>
        <ng-select
          #bankCtl
          [searchable]="true"
          [items]="$specializations | async"
          [trackByFn]="bankTrackedBy"
          bindLabel="name"
          bindValue="id"
          [loading]="bankLoading"
          [placeholder]="'Select sub specialization ...'"
          typeToSearchText="Start typing sub specialization name..."
          [typeahead]="$bankInput"
          id="subSpecializationId"
          name="subSpecializationId"
          formControlName="subSpecializationId"
          [ngClass]="{
            'is-valid': subSpecializationId.touched && !subSpecializationId.invalid,
            'is-invalid': subSpecializationId.touched && subSpecializationId.invalid
          }"
        >
        </ng-select>

        <ng-template ng-header-tmp>
          <input
            appAutofocus
            class="form-control form-control-sm bg-primary-subtle text-primary"
            style="width: 100%; line-height: 24px"
            type="text"
            (input)="bankCtl.filter($event.target['value'])"
          />
        </ng-template>
      </div>
    </div>
  </div>

  <div class="form-group row mt-4">
    <div class="col-12 text-center">
      <button type="submit" class="btn btn-primary" [disabled]="frm.invalid">
        <i class="ri ri-save-line label-icon align-middle fs-16 me-2"></i>
        {{ saveLabel }} Details
      </button>
    </div>
  </div>
</form>
