<form *ngIf="isLoaded && !isError" (ngSubmit)="goToNext(frm)" [formGroup]="frm" novalidate>
  <div class="row">
    <div class="col-md-12">
      <app-tp-input [label]="'Award Name'" [type]="'text'" formControlName="awardOrRecognitionName" [control]="awardOrRecognitionName"> </app-tp-input>
    </div>
    <div class="col-12">
      <div class="mb-3" class="date-input">
        <label *ngIf="!awardYear.touched" [for]="id" class="d-block"> Award Year {{ isRequired }} </label>
        <label *ngIf="awardYear.touched && !awardYear.invalid" [for]="id" class="valid-feedback d-block">Award Year {{ isRequired }}</label>
        <label *ngIf="awardYear.touched && awardYear.invalid" [for]="id" class="invalid-feedback d-block">Award Year {{ isRequired }}</label>
        <div class="cal-icon">
          <input
            placeholder="Select Date"
            class="form-control flatpickr-input"
            formControlName="awardYear"
            [minDate]="minDate"
            type="text"
            mwlFlatpickr
            [altInput]="true"
            [convertModelValue]="true"
          />
          <!-- <input formControlName="awardYear" placeholder="Select Date" type="text"  class="form-control mb-3" #dp="bsDatepicker" bsDatepicker  container=".date-input" /> -->
        </div>
      </div>
    </div>
    <div class="col-md-12 mt-4">
      <app-tp-input [label]="'Award Description'" [type]="'textarea'" formControlName="awardDescription" [control]="awardDescription"> </app-tp-input>
    </div>
  </div>

  <div class="form-group row mt-4">
    <div class="col-12 text-center">
      <button type="submit" class="btn btn-primary" [disabled]="frm.invalid">
        <i class="ri ri-save-line label-icon align-middle fs-16 me-2"></i>
        {{ saveLabel }} Details
      </button>
    </div>
  </div>
</form>
