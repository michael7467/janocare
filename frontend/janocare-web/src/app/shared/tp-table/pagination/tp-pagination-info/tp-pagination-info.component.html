<ng-container *ngIf="!loading">
  <ng-container>
    <small *ngIf="collectionSize <= 0" class="text-danger align-center">There are no records to show</small>
    <small *ngIf="collectionSize > 0" class="text-primary">Showing Records {{ start }} to {{ end }} of {{ collectionSize }}</small>
  </ng-container>
</ng-container>
