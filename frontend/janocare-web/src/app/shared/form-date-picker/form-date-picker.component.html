<div class="form-row mb-1">
  <div class="col-12">
    <label *ngIf="!control?.touched" [for]="config.name" class="d-block"> {{ Label }}{{ isRequired }} </label>
    <label *ngIf="control?.touched && !control?.invalid" [for]="config.name" class="valid-feedback d-block">{{ Label }}{{ isRequired }}</label>
    <label *ngIf="control?.touched && control?.invalid" [for]="config.name" class="invalid-feedback d-block">{{ Label }}{{ isRequired }}</label>
  </div>

  <div class="col-12">
    <div class="row">
      <div class="col-md-12">
        <div #ddown ngbDropdown container="body">
          <div class="input-group">
            <input
              type="text"
              [placeholder]="placeholder || 'Select date...'"
              [id]="id"
         
              [value]="value"
 
              readonly
              ngbDropdownToggle
              class="form-control rounded-0 fs-6 px-2"
            />
            <button type="button" [id]="'btn_' + value" ngbDropdownToggle class="btn btn-outline-primary btn-sm rounded-0" style="border-color: #cfcbcb">
              <i class="mdi mdi-calendar-month"></i>
            </button>
          </div>

          <div ngbDropdownMenu display="dynamic">
            <!-- <ngb-datepicker
              #dp
              (dateSelect)="onDateSelection($event)"
              [footerTemplate]="footerTemplate"
              [displayMonths]="monthsToDisplay"
              [minDate]="minDate"
              [maxDate]="maxDate"
              [dayTemplate]="t"
              outsideDays="hidden"
            >
            </ngb-datepicker> -->

            <ng-template #t let-date let-focused="focused" let-currentMonth="currentMonth" let-selected="selected" let-disabled="disabled">
              <span
                class="custom-day"
                [class.focused]="focused"
                [class.range]="isRange(date)"
                [class.weekend]="isWeekend(date)"
                [class.focused]="focused"
                [class.bg-primary]="selected"
                [class.hidden]="date.month !== currentMonth"
                [class.text-muted]="disabled"
                [class.faded]="isHovered(date) || isInside(date)"
                (mouseenter)="hoveredDate = date"
                (mouseleave)="hoveredDate = null"
              >
                {{ date.day }}
              </span>
            </ng-template>
            <ng-template #footerTemplate>
              <hr class="my-0" />
              <button type="button" class="btn btn-primary btn-sm m-2 float-start" (click)="onDateSelection(calendar.getToday())">Today</button>
              <button type="button" class="btn btn-secondary btn-sm m-2 float-end" (click)="clearSelection()">Clear</button>
            </ng-template>
          </div>
        </div>
      </div>
    </div>
  </div>
  <small *ngIf="helpText" [id]="id + 'Help'" class="form-text text-muted">
    {{ helpText }}
  </small>

  <div [id]="'validation' + id" class="invalid-feedback d-block">
    &nbsp;
    <ng-container *ngIf="control?.touched && control?.invalid">
      <small class="text-danger" *ngFor="let error of Errors"> <i class="ri ri-close-line"> </i> {{ error.message }} </small>
    </ng-container>
  </div>
</div>
