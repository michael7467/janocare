version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: janocare-postgres
    restart: always
    environment:
      POSTGRES_DB: janocare_professional
      POSTGRES_USER: janocare
      POSTGRES_PASSWORD: janocare123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer
    container_name: janocare-adminer
    restart: always
    ports:
      - "8081:8080"

volumes:
  postgres_data: